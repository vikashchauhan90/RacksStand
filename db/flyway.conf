# =====================================================
# Flyway Configuration for UserManagement Module
# =====================================================

# Database connection
flyway.url=jdbc:postgresql://localhost:5432/racksstands
flyway.user=${env.DB_USER}
flyway.password=${env.DB_PASSWORD}

# Migration locations (order matters: schema first, then repeatable)
flyway.locations=filesystem:./db/schema
flyway.locations=filesystem:./db/repeatable
flyway.locations=filesystem:./db/undo

# Naming convention
flyway.sqlMigrationPrefix=V
flyway.repeatableSqlMigrationPrefix=R
flyway.undoSqlMigrationPrefix=U
flyway.sqlMigrationSeparator=__
flyway.sqlMigrationSuffix=.sql

# Baseline (for existing databases)
flyway.baselineOnMigrate=true
flyway.baselineVersion=0
flyway.baselineDescription="Base migration"

# Validation
flyway.validateOnMigrate=true
flyway.cleanDisabled=true
flyway.cleanOnValidationError=false

# Out of order migrations (disable for production)
flyway.outOfOrder=false

# Encoding
flyway.encoding=UTF-8

# Placeholders (optional)
flyway.placeholderReplacement=false